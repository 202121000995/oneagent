<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodeTools Login</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260612-4">
</head>
<body>
  <main class="login-shell">
    <form class="login-form" id="loginForm">
      <h1>NodeTools Agent</h1>
      <label>用户名<input name="username" value="admin" autocomplete="username"></label>
      <label>密码<input name="password" type="password" autocomplete="current-password"></label>
      <p class="form-error" id="loginError"></p>
      <button type="submit">进入面板</button>
    </form>
  </main>
  <script src="/static/js/dashboard.js?v=20260612-4"></script>
</body>
</html>
